name: Deploy to Google Cloud VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Authenticate with Google Cloud using the Service Account Secret
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          # This secret holds the JSON key you downloaded
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 3. Install and configure the gcloud CLI
      - name: 'Set up Cloud SDK (gcloud)'
        uses: 'google-github-actions/setup-gcloud@v2'
        
      # 4. Connect and Deploy using gcloud compute ssh
      - name: 'SSH and Deploy Bot'
        run: |
          gcloud compute ssh '${{ secrets.GCP_VM_NAME }}' \
            --zone='${{ secrets.GCP_ZONE }}' \
            --project='${{ secrets.GCP_PROJECT_ID }}' \
            --command='
              export PATH="$PATH:/usr/local/bin:$HOME/.nvm/versions/node/*/bin"
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

              cd ${{ secrets.DEPLOY_PATH }}

              git config --global --add safe.directory ${{ secrets.DEPLOY_PATH }}
              git fetch origin
              git reset --hard origin/main

              npm install
              npm run deploy-commands

              sudo systemctl restart ${{ secrets.SERVICE_NAME }}
            '
